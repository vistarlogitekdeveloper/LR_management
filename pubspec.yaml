name: lr_management
description: "Vistar Logitek - LR Generation Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.2

  # Fonts & icons
  google_fonts: ^6.2.1

  # Formatting
  intl: ^0.19.0

  # PDF / Print
  pdf: ^3.11.1
  printing: ^5.13.4

  # Persistence (lightweight, for session)
  shared_preferences: ^2.3.3

  # UUID for ids
  uuid: ^4.5.1

  # Invoice file uploads
  file_picker: ^8.1.4

  # HTTP client
  dio: ^5.7.0

  # Secure storage for JWT (access + refresh)
  flutter_secure_storage: ^9.2.2

  # Maps — free OpenStreetMap stack for the route location picker.
  # flutter_map renders OSM tiles (no API key); geocoding/search goes through
  # the backend /maps proxy (Nominatim, also keyless).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # One-command (re)generation of native launcher icons from icon/app_icon.png.
  # Web favicon / PWA icons are maintained separately under web/.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# Native launcher icons — run `dart run flutter_launcher_icons` after changing
# icon/app_icon.png. Web icons are generated separately (web: false).
flutter_launcher_icons:
  image_path: "icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "icon/app_icon.png"
  windows:
    generate: true
    image_path: "icon/app_icon.png"
  web:
    generate: false
